<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      overflow: hidden;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      position: relative;
      width: 380px;
      padding: 40px 30px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      background: rgba(30, 30, 46, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      color: rgba(255, 255, 255, 0.8);
      font-size: 20px;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateX(-3px);
      color: white;
    }

    .title {
      color: white;
      font-size: 28px;
      font-weight: 600;
      text-align: right;
      flex-grow: 1;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .input-group {
      position: relative;
      margin-bottom: 30px;
    }

    .input-group input {
      width: 100%;
      padding: 15px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      outline: none;
      color: white;
      font-size: 16px;
      transition: all 0.3s ease;
      z-index: 1;
    }

    .input-group input:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .input-group label {
      position: absolute;
      top: 15px;
      left: 20px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 16px;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 0;
    }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: -10px;
      left: 15px;
      font-size: 12px;
      background: #1a1a2e;
      padding: 0 5px;
      border-radius: 5px;
      color: rgba(255, 255, 255, 0.9);
      z-index: 2;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .show-password {
      margin-top: -20px;
      margin-bottom: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 20;
    }

    .login-btn:hover {
      background: white;
      color: #1a1a2e;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .footer a {
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .footer a:hover {
      color: white;
      text-decoration: underline;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.05);
      animation: float 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-1000px) rotate(720deg); }
    }

    @media (max-width: 420px) {
      .container {
        width: 90%;
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
    
  <!-- Bubbles -->
  <div class="bubble" style="width: 100px; height: 100px; left: 10%; top: 90%;"></div>
  <div class="bubble" style="width: 150px; height: 150px; left: 70%; top: 95%;"></div>
  <div class="bubble" style="width: 80px; height: 80px; left: 30%; top: 85%;"></div>
  <div class="bubble" style="width: 120px; height: 120px; left: 80%; top: 100%;"></div>

  <!-- Login Form -->
  <div class="container">
    <div class="header">
      <button class="back-btn" onclick="history.back()">←</button>
      <div class="title">Student Login</div>
    </div>

    <form id="loginForm" action="student-login.php" method="POST">
      <div class="input-group">
        <input type="text" name="usn" id="usn" required placeholder=" ">
        <label for="usn">USN</label>
      </div>

      <div class="input-group">
        <input type="password" name="password" id="password" required placeholder=" ">
        <label for="password">Password</label>
      </div>

      <div class="show-password">
        <input type="checkbox" id="showPass" onclick="togglePassword()"> Show Password
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer">
      Don't have an account? <a href="#">Register here</a>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    function togglePassword() {
      const passField = document.getElementById("password");
      passField.type = passField.type === "password" ? "text" : "password";
    }
  
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      const usn = document.getElementById("usn").value.trim();
      const password = document.getElementById("password").value;
  
      // First check if fields are empty
      if (usn === "" || password === "") {
        alert("Please enter both USN and Password.");
        e.preventDefault();
        return;
      }
  
      // Then validate USN format
      const usnPattern = /^[1-9][A-Z]{2}\d{2}[A-Z]{2}\d{3}$/i;
      if (!usnPattern.test(usn)) {
        alert("Enter a valid USN.");
        e.preventDefault();
        return;
      }
  
      // Optional: Add console logs for debugging
      console.log("[Login Form] USN and password validated. Submitting...");
    });
  </script>
  
  


  
</body>
</html>
